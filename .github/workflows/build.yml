name: Java CI with Maven (Java 7 cross-compile via JDK 8)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven (Cross-compile to Java 7)
      run: mvn -B clean package --file pom.xml

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v3
      with:
        name: sherpa-asr-se7-jar
        path: target/sherpa-asr-se7-1.0.0-shaded.jar

    - name: Upload all artifacts
      uses: actions/upload-artifact@v3
      with:
        name: sherpa-asr-se7-all
        path: target/
        
    - name: Upload lib dependencies
      uses: actions/upload-artifact@v3
      with:
        name: sherpa-asr-se7-libs
        path: target/lib/
